# cargo-deny configuration. Run locally with `cargo deny check`; CI gates on it.

[advisories]
version = 2
yanked = "deny"
ignore = [
    # `rsa` Marvin timing side-channel (no fixed release yet). LTBox does AVB /
    # key work locally on the user's own machine; the attack needs an attacker
    # observing many timed signing operations, which this offline desktop flow
    # does not expose. Revisit when a fixed `rsa` ships.
    "RUSTSEC-2023-0071",
    # Unmaintained transitive crates (no known vulnerability), pulled deep via
    # build/UI dependencies and not used directly. Accepted for now.
    "RUSTSEC-2021-0139", # ansi_term unmaintained
    "RUSTSEC-2024-0375", # atty unmaintained
    "RUSTSEC-2024-0436", # paste unmaintained
    "RUSTSEC-2025-0052", # async-std discontinued
    "RUSTSEC-2025-0141", # bincode unmaintained
    "RUSTSEC-2026-0192", # ttf-parser unmaintained (deep via iced cosmic-text; no upgrade path)
    # `quick-xml` <0.41 DoS/quadratic-parse advisories. Pulled ONLY by
    # `wayland-scanner` (Linux Wayland-protocol codegen at BUILD time) via
    # winit/iced; LTBox's own XML parsing uses `roxmltree`, so quick-xml never
    # sees untrusted input — the codegen only reads the fixed, trusted protocol
    # XML. No upgrade path yet: the latest `wayland-scanner` 0.31.10 pins
    # `quick-xml = "^0.39"`, and the fix needs a wayland-scanner/winit release.
    # Revisit when the winit/Wayland stack widens the requirement.
    "RUSTSEC-2026-0194", # quick-xml quadratic duplicate-attr check (build-time wayland-scanner)
    "RUSTSEC-2026-0195", # quick-xml unbounded namespace alloc DoS (build-time wayland-scanner)
]

[bans]
# The GUI/platform dependency graph intentionally carries many duplicate
# transitive versions; keep this gate focused on advisories/licenses/sources.
multiple-versions = "allow"
# Workspace path deps and the git deps legitimately carry no version constraint.
wildcards = "allow"

[licenses]
version = 2
allow = [
    "GPL-3.0-or-later",       # LTBox itself
    "GPL-2.0-or-later",       # kptools (or-later -> usable as GPL-3.0)
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
    "NCSA",
    "bzip2-1.0.6",
    "CDLA-Permissive-2.0",
]

# magiskboot-rs ships a verbatim GPL-3.0 LICENSE file but leaves the Cargo
# `license` field empty, so cargo-deny cannot auto-detect it. Assert it for the
# crate and its `base` / `derive` sub-crates (same git source).
[[licenses.clarify]]
crate = "magiskboot@0.1.1"
expression = "GPL-3.0-or-later"
license-files = []

[[licenses.clarify]]
crate = "base@0.1.1"
expression = "GPL-3.0-or-later"
license-files = []

[[licenses.clarify]]
crate = "derive@0.1.1"
expression = "GPL-3.0-or-later"
license-files = []

# `unescaper` uses the old slash-separated `GPL-3.0/MIT` Cargo syntax, which
# cargo-deny treats as a parse warning. Assert the intended dual license.
[[licenses.clarify]]
crate = "unescaper@0.1.8"
expression = "MIT OR GPL-3.0-only"
license-files = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/miner7222/avbtool-rs",
    "https://github.com/miner7222/magiskboot-rs",
    "https://github.com/miner7222/kptools-rs",
    "https://github.com/A-Disruption/iced_lucide",
]
