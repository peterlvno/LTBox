name: Release Based On Tag

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/windows_test.yml
    secrets: inherit

  preflight:
    needs: test
    runs-on: windows-latest
    outputs:
      tag_name: ${{ steps.preflight.outputs.tag_name }}
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Run release tag preflight
        id: preflight
        uses: ./.github/actions/release-preflight
        with:
          tag: ${{ github.ref_name }}

      - name: Preflight Summary
        env:
          TAG_NAME: ${{ steps.preflight.outputs.tag_name }}
        run: |
          "### Release Preflight" >> $env:GITHUB_STEP_SUMMARY
          "- Tag: $env:TAG_NAME" >> $env:GITHUB_STEP_SUMMARY
          "- Config version matches tag ?" >> $env:GITHUB_STEP_SUMMARY

  release:
    needs: preflight
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Set release tag from preflight output
        run: |
          "TAG_NAME=${{ needs.preflight.outputs.tag_name }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup Environment & FW Cache
        uses: ./.github/actions/setup-fw-env
        with:
          fw-password: ${{ secrets.TEST_FW_PASSWORD }}
          fw-url: ${{ secrets.TEST_FW_URL }}

      - name: Install Tools from Cache
        run: ./.github/scripts/release/install-tools-from-cache.ps1

      - name: Download tools artifact from test job
        uses: actions/download-artifact@v7
        with:
          name: tools-exe
          path: bin/tools/

      - name: Bundle base tools
        run: python .github/scripts/release/bundle-tools.py

      - name: Bundle Python environment
        run: python .github/scripts/release/bundle-python.py

      - name: Verify required release inputs
        run: |
          $requiredFiles = @(
            'bin/tools/fh_loader.exe',
            'bin/tools/QSaharaServer.exe',
            'bin/tools/magiskboot.exe',
            'bin/tools/adb.exe',
            'bin/tools/fastboot.exe',
            'bin/tools/avbtool.py',
            'bin/tools/kptools.exe',
            'bin/tools/testkey_rsa4096.pem',
            'bin/tools/testkey_rsa2048.pem',
            'bin/python3/python.exe'
          )

          foreach ($required in $requiredFiles) {
            if (-not (Test-Path $required)) {
              throw "[release][precheck] Missing required file: $required"
            }
            Write-Host "[release][precheck] Found $required"
          }

      - name: Create Archive
        run: ./.github/scripts/release/create-archive.ps1 -TagName "$env:TAG_NAME"

      - name: Generate Checksums
        run: ./.github/scripts/release/generate-checksums.ps1 -TagName "$env:TAG_NAME"

      - name: Verify release artifacts
        run: |
          $archive = "LTBox-win_amd64-$env:TAG_NAME.zip"
          $checksum = "$archive.sha256"

          if (-not (Test-Path $archive)) {
            throw "[release][verify] Missing archive: $archive"
          }
          if (-not (Test-Path $checksum)) {
            throw "[release][verify] Missing checksum: $checksum"
          }

          $archiveInfo = Get-Item $archive
          Write-Host "[release][verify] Archive size: $([Math]::Round($archiveInfo.Length / 1MB, 2)) MB"

          "### Release Artifacts" >> $env:GITHUB_STEP_SUMMARY
          "- Archive: $archive ($([Math]::Round($archiveInfo.Length / 1MB, 2)) MB)" >> $env:GITHUB_STEP_SUMMARY
          "- Checksum: $checksum" >> $env:GITHUB_STEP_SUMMARY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          prerelease: true
          generate_release_notes: true
          files: |
            LTBox-win_amd64-*.zip
            LTBox-win_amd64-*.zip.sha256
