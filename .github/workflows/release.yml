name: Release Based On Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/windows_test.yml
    secrets: inherit

  release:
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Tag Name
        id: resolve-tag
        run: ./.github/scripts/release/resolve-tag.ps1 -Tag "${{ github.ref_name }}"

      - name: Verify Version Match
        run: ./.github/scripts/release/verify-version-match.ps1 -TagName "$env:TAG_NAME"

      - name: Setup Environment & FW Cache
        uses: ./.github/actions/setup-fw-env
        with:
          fw-password: ${{ secrets.TEST_FW_PASSWORD }}
          fw-url: ${{ secrets.TEST_FW_URL }}

      - name: Install Tools from Cache
        run: ./.github/scripts/release/install-tools-from-cache.ps1

      - name: Download tools artifact from test job
        uses: actions/download-artifact@v8
        with:
          name: tools-exe
          path: bin/tools/

      - name: Create Archive
        run: ./.github/scripts/release/create-archive.ps1 -TagName "$env:TAG_NAME"

      - name: Generate Checksums
        run: ./.github/scripts/release/generate-checksums.ps1 -TagName "$env:TAG_NAME"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          prerelease: true
          generate_release_notes: true
          files: |
            LTBox-win_amd64-*.zip
            LTBox-win_amd64-*.zip.sha256
