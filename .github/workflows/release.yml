name: Release Based On Tag

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/windows_test.yml
    secrets: inherit

  build-qdlrs:
    uses: ./.github/workflows/build-qdlrs.yml

  preflight:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 5
    outputs:
      tag_name: ${{ steps.preflight.outputs.tag_name }}
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Run release tag preflight
        id: preflight
        uses: ./.github/actions/release-preflight
        with:
          tag: ${{ github.ref_name }}

      - name: Preflight Summary
        env:
          TAG_NAME: ${{ steps.preflight.outputs.tag_name }}
        run: |
          "### Release Preflight" >> $env:GITHUB_STEP_SUMMARY
          "- Tag: $env:TAG_NAME" >> $env:GITHUB_STEP_SUMMARY
          "- Config version matches tag ?" >> $env:GITHUB_STEP_SUMMARY

  build:
    needs: [preflight, build-qdlrs]
    uses: ./.github/workflows/build-archive.yml
    with:
      tag-name: ${{ needs.preflight.outputs.tag_name }}
    secrets: inherit

  release:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: build-archive

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.preflight.outputs.tag_name }}
          draft: true
          prerelease: true
          generate_release_notes: true
          files: |
            LTBox-win_amd64-*.zip
            LTBox-win_amd64-*.zip.sha256
