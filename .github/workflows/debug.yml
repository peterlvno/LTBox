name: Debug Build

concurrency:
  group: debug-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
    paths-ignore:
      - '*.md'
      - '**/*.md'

jobs:
  test:
    uses: ./.github/workflows/windows_test.yml
    secrets: inherit

  resolve-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag-name: ${{ steps.sha.outputs.tag-name }}
    steps:
      - id: sha
        run: echo "tag-name=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build:
    needs: [test, resolve-tag]
    uses: ./.github/workflows/build-archive.yml
    with:
      tag-name: ${{ needs.resolve-tag.outputs.tag-name }}
    secrets: inherit
