name: Build Archive

on:
  workflow_call:
    inputs:
      tag-name:
        description: Version tag or short SHA used in the archive filename
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set TAG_NAME
        run: |
          "TAG_NAME=${{ inputs.tag-name }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup Environment & FW Cache
        uses: ./.github/actions/setup-fw-env
        with:
          fw-password: ${{ secrets.TEST_FW_PASSWORD }}
          fw-url: ${{ secrets.TEST_FW_URL }}

      - name: Install Tools from Cache
        run: ./.github/scripts/release/install-tools-from-cache.ps1

      - name: Download tools artifact from test job
        uses: actions/download-artifact@v8
        with:
          name: tools-exe
          path: bin/tools/

      - name: Bundle base tools
        run: python .github/scripts/release/bundle-tools.py

      - name: Bundle Python environment
        run: python .github/scripts/release/bundle-python.py

      - name: Verify required files
        run: |
          $requiredFiles = @(
            'bin/tools/fh_loader.exe',
            'bin/tools/QSaharaServer.exe',
            'bin/tools/magiskboot.exe',
            'bin/tools/adb.exe',
            'bin/tools/fastboot.exe',
            'bin/tools/avbtool.py',
            'bin/tools/kptools.exe',
            'bin/tools/update_engine/scripts/update_metadata_pb2.py',
            'bin/tools/update_engine/scripts/update_payload/payload.py',
            'bin/tools/otatools/linux/bin/delta_generator',
            'bin/tools/otatools/linux/bin/lpmake',
            'bin/tools/testkey_rsa4096.pem',
            'bin/tools/testkey_rsa2048.pem',
            'bin/python3/python.exe'
          )

          foreach ($required in $requiredFiles) {
            if (-not (Test-Path $required)) {
              throw "[build] Missing required file: $required"
            }
            Write-Host "[build] Found $required"
          }

      - name: Create Archive
        run: ./.github/scripts/release/create-archive.ps1 -TagName "$env:TAG_NAME"

      - name: Generate Checksums
        run: ./.github/scripts/release/generate-checksums.ps1 -TagName "$env:TAG_NAME"

      - name: Verify build artifacts
        run: |
          $archive = "LTBox-win_amd64-$env:TAG_NAME.zip"
          $checksum = "$archive.sha256"

          if (-not (Test-Path $archive)) {
            throw "[build] Missing archive: $archive"
          }
          if (-not (Test-Path $checksum)) {
            throw "[build] Missing checksum: $checksum"
          }

          $archiveInfo = Get-Item $archive
          Write-Host "[build] Archive size: $([Math]::Round($archiveInfo.Length / 1MB, 2)) MB"

          "### Build Artifacts" >> $env:GITHUB_STEP_SUMMARY
          "- Archive: $archive ($([Math]::Round($archiveInfo.Length / 1MB, 2)) MB)" >> $env:GITHUB_STEP_SUMMARY
          "- Checksum: $checksum" >> $env:GITHUB_STEP_SUMMARY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-archive
          path: |
            LTBox-win_amd64-*.zip
            LTBox-win_amd64-*.zip.sha256
