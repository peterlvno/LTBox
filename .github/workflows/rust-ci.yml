name: Rust CI

concurrency:
  group: rust-ci-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'ObsidianVault/**'
      - 'READMEs/**'
      - 'LICENSE'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'ObsidianVault/**'
      - 'READMEs/**'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt-clippy:
    name: fmt + clippy
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build ${{ matrix.name }}
    needs: fmt-clippy
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win_x86_64
            target: x86_64-pc-windows-msvc
            msvc_arch: x64
          - name: win_arm64
            target: aarch64-pc-windows-msvc
            msvc_arch: arm64
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC for ${{ matrix.msvc_arch }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install Rust toolchain (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Resolve release tag or commit
        id: meta
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $tag = "${{ github.ref_name }}"
          } else {
            $short = "${{ github.sha }}".Substring(0, 7)
            $tag = "$short"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "is_release=${{ startsWith(github.ref, 'refs/tags/v') }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: cargo build --release
        # Cross-compile quirks for aarch64-pc-windows-msvc on an x64
        # runner:
        # 1. msvc-dev-cmd puts the ARM64 LLVM shipped with VS first on
        #    PATH. cc-rs would then resolve `clang` against that, but
        #    the runner host is x64, so the ARM64 `clang.exe` fails
        #    with OS error 216 (EXE machine-type mismatch).
        # 2. cc-rs adds MSVC-style flags like `/source-charset:utf-8`
        #    whenever the target is `*-msvc`. The plain `clang.exe`
        #    driver is gnu-style and interprets `/…` as a file path,
        #    so it dies with `no such file or directory`. `clang-cl`
        #    is the MSVC-compatible driver that accepts those flags.
        # Point cc-rs at the x64 `clang-cl.exe` that ships in
        # `C:\Program Files\LLVM\bin` for the aarch64 target only.
        env:
          CC_aarch64_pc_windows_msvc: ${{ matrix.target == 'aarch64-pc-windows-msvc' && 'C:\Program Files\LLVM\bin\clang-cl.exe' || '' }}
        run: cargo build --release --target ${{ matrix.target }} -p ltbox-gui

      - name: cargo test (host arch only)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Stage artifact
        id: stage
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $stageDir = "stage/LTBox-${{ matrix.name }}-$tag"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/ltbox.exe" -Destination $stageDir
          if (Test-Path "README.md") { Copy-Item "README.md" -Destination $stageDir }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" -Destination $stageDir }
          $zipName = "LTBox-${{ matrix.name }}-$tag.zip"
          Compress-Archive -Path "$stageDir/*" -DestinationPath $zipName -Force
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Out-File -Encoding ascii "$zipName.sha256"
          "zip=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ steps.meta.outputs.tag }}
          path: |
            ${{ steps.stage.outputs.zip }}
            ${{ steps.stage.outputs.zip }}.sha256
          if-no-files-found: error

  release:
    name: Draft GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/**/LTBox-win_x86_64-*.zip
            artifacts/**/LTBox-win_x86_64-*.zip.sha256
            artifacts/**/LTBox-win_arm64-*.zip
            artifacts/**/LTBox-win_arm64-*.zip.sha256
