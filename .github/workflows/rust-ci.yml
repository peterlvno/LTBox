name: Rust CI

# Ubuntu runners cross-compile every Windows target via cargo-xwin so
# the Windows-specific msvc-dev-cmd / clang vs clang-cl / link.exe
# machine-type / LLVM-on-PATH dance from the previous matrix is gone.
# The only Windows job left is `test` because cross-built .exes can't
# execute on Linux (Wine is not viable for an iced GUI binary), and
# the test gate has to actually run the binary.
#
# Migration plan if/when a Linux build target is wanted: add a
# `build-linux-x86_64` job using the same `lint` toolchain — no xwin,
# just `cargo build --release --target x86_64-unknown-linux-gnu`.

concurrency:
  group: rust-ci-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'ObsidianVault/**'
      - 'READMEs/**'
      - 'LICENSE'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'ObsidianVault/**'
      - 'READMEs/**'
      - 'LICENSE'
  workflow_dispatch:

# Least privilege at the top level; only the release job needs write, and it
# grants `contents: write` to itself.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_XWIN_VERSION: "0.22.0"
  NODE_OPTIONS: --no-deprecation
  RUSTC_WRAPPER: sccache
  RUSTFLAGS: -D warnings
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_GHA_VERSION: ltbox-v1
  # sccache can't cache incremental builds, so without this the dev-profile
  # `cargo test` / `cargo clippy` jobs (the ones that run on every PR) compile
  # uncached. Disable incremental — ephemeral runners never reuse it anyway.
  CARGO_INCREMENTAL: "0"
  # cargo-xwin auto-accepts the Microsoft Software License Terms via
  # this env var so the install is non-interactive. Same effect as
  # passing `--accept-license` to every `cargo xwin …` invocation.
  XWIN_ACCEPT_LICENSE: "1"

jobs:
  fmt-clippy:
    name: fmt + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM toolchain
        # cargo-xwin needs clang-cl + lld-link to drive the cross
        # MSVC compile that clippy delegates to.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld llvm nasm

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        # `dtolnay/rust-toolchain` always installs whatever its
        # `toolchain` input (or `@<ref>`) resolves to AND attaches
        # `targets:` to THAT toolchain — independent of
        # `rust-toolchain.toml`. Cargo then switches to the toml's
        # pinned channel (1.95.0) and finds no targets there.
        # Skip the action entirely; rustup is preinstalled on
        # ubuntu-latest, `rustup show` triggers the toml-driven
        # install, then `component add` / `target add` land on the
        # active 1.95.0 toolchain.
        run: |
          rustup show
          rustup component add rustfmt clippy
          rustup target add x86_64-pc-windows-msvc

      - name: Install cargo-xwin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin@${{ env.CARGO_XWIN_VERSION }}

      - name: Cache xwin SDK
        # Keep this target-exact. A broad restore prefix can pull an
        # incompatible target's clang-cl shim/cache state into this job.
        uses: actions/cache@v5
        with:
          path: ~/.cache/cargo-xwin
          key: xwin-${{ runner.os }}-${{ env.CARGO_XWIN_VERSION }}-x86_64-pc-windows-msvc-v2

      - name: Cargo source cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-sources-${{ runner.os }}-${{ runner.arch }}
          cache-targets: false
          cache-bin: false

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo xwin clippy
        # Workspace pulls Windows-only crates (`windows-sys`,
        # `winresource`, `serialport` via libusb1-sys) AND uses
        # `#[cfg(windows)]` modules unconditionally
        # (`stdout_tap`, `windows_driver`, …). Linting against the
        # Linux host fails on libudev-sys + missing `windows::*`
        # APIs. Target x86_64-pc-windows-msvc through the same
        # cargo-xwin sysroot the build jobs use so clippy sees the
        # same world rustc will compile against.
        run: cargo xwin clippy --workspace --all-targets --locked --target x86_64-pc-windows-msvc -- -D warnings

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Cache cargo-deny advisory DB
        uses: actions/cache@v5
        with:
          path: ~/.cargo/advisory-dbs
          key: cargo-deny-advisory-db-${{ runner.os }}-v1
          restore-keys: |
            cargo-deny-advisory-db-${{ runner.os }}-

      - name: cargo deny check
        # Advisories (RUSTSEC), license policy, banned crates, and dependency
        # sources — config in deny.toml at the repo root. This metadata-only
        # job does not install sccache, so keep it independent of the global
        # compiler wrapper used by build/test jobs.
        run: |
          unset RUSTC_WRAPPER
          cargo deny check

  build-windows:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win_x86_64
            target: x86_64-pc-windows-msvc
          - name: win_arm64
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM toolchain
        # cargo-xwin uses clang-cl + lld-link as the cross MSVC
        # toolchain. `llvm-rc` (resource compiler) is the
        # `winresource` build.rs counterpart to MSVC's `rc.exe`.
        # `nasm` keeps `ring`'s aarch64 cross-build happy.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld llvm nasm

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        # See lint job for the rationale on bypassing
        # dtolnay/rust-toolchain — same wrong-toolchain attachment
        # bug applies to the cross target install here.
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - name: Install cargo-xwin
        # Pin a known-good release so a surprise upstream behaviour
        # change can't silently re-break the cross build.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin@${{ env.CARGO_XWIN_VERSION }}

      - name: Cache xwin SDK
        # ~1.5 GB of MSVC CRT + Windows SDK headers/libs that
        # cargo-xwin downloads on first run. Keep this target-exact:
        # restoring another target's cache can bring incompatible
        # clang-cl shim state into the job.
        uses: actions/cache@v5
        with:
          path: ~/.cache/cargo-xwin
          key: xwin-${{ runner.os }}-${{ env.CARGO_XWIN_VERSION }}-${{ matrix.target }}-v2

      - name: Cargo source cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-sources-${{ runner.os }}-${{ runner.arch }}
          cache-targets: false
          cache-bin: false

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Resolve release tag or commit
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${GITHUB_SHA:0:7}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "is_release=${{ startsWith(github.ref, 'refs/tags/v') }}" >> "${GITHUB_OUTPUT}"

      - name: Install clang shim for ring aarch64 cross
        # `ring`'s build.rs hardcodes the compiler to bare `clang`
        # for `aarch64-pc-windows-msvc` and ignores `CC_<target>`
        # overrides — so xwin's MSVC-style `/imsvc <path>` flags
        # blow up with `clang: error: no such file or directory:
        # '/imsvc'` because gnu-driver clang doesn't speak MSVC
        # syntax. PATH-shim a `clang` wrapper that detects the
        # aarch64-pc-windows-msvc target on the command line and
        # flips into `--driver-mode=cl` (i.e. clang-cl behaviour)
        # for that one case; every other `clang` invocation falls
        # through to the real binary unchanged.
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: |
          shim_dir="${HOME}/.local/bin/ring-clang-shim"
          mkdir -p "${shim_dir}"
          real_clang="$(command -v clang)"
          cat > "${shim_dir}/clang" <<EOF
          #!/bin/bash
          if [[ "\$*" == *"--target=aarch64-pc-windows-msvc"* ]]; then
            exec "${real_clang}" --driver-mode=cl "\$@"
          else
            exec "${real_clang}" "\$@"
          fi
          EOF
          chmod +x "${shim_dir}/clang"
          echo "${shim_dir}" >> "${GITHUB_PATH}"

      - name: cargo xwin build --release
        # cargo-xwin wires up the cross sysroot + lld-link + llvm-rc.
        # CC_/CXX_/AR_ env overrides cover deps that respect cc-rs's
        # standard env-var lookup; ring needs the PATH shim above.
        env:
          CC_aarch64_pc_windows_msvc: clang-cl
          CXX_aarch64_pc_windows_msvc: clang-cl
          AR_aarch64_pc_windows_msvc: llvm-lib
        run: cargo xwin build --release --locked --target ${{ matrix.target }} -p ltbox-gui

      - name: Stage artifact
        id: stage
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          stage_dir="stage/LTBox-${{ matrix.name }}-${tag}"
          mkdir -p "${stage_dir}"
          cp "target/${{ matrix.target }}/release/ltbox.exe" "${stage_dir}/"
          [[ -f README.md ]] && cp README.md "${stage_dir}/"
          [[ -f LICENSE ]]   && cp LICENSE   "${stage_dir}/"
          zip_name="LTBox-${{ matrix.name }}-${tag}.zip"
          (cd "$(dirname "${stage_dir}")" && zip -r "${OLDPWD}/${zip_name}" "$(basename "${stage_dir}")")
          sha256sum "${zip_name}" | awk '{print $1"  "$2}' > "${zip_name}.sha256"
          echo "zip=${zip_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-${{ steps.meta.outputs.tag }}
          path: |
            ${{ steps.stage.outputs.zip }}
            ${{ steps.stage.outputs.zip }}.sha256
          if-no-files-found: error

  build-linux:
    name: Build linux_${{ matrix.arch }}
    # Each matrix entry pins its runner so the artifact inherits the
    # older glibc 2.35 floor (ubuntu-22.04 / -arm). AppImage built
    # against an older glibc is forward-compatible with newer
    # distros; the reverse is not. Future packaging jobs share the
    # same base. arm64 leg uses GitHub's native arm64 runner
    # (ubuntu-22.04-arm) so the build is host-native rather than a
    # cross-toolchain shim — proves the same code path real arm64
    # users will exercise without an extra sysroot/cc-rs setup.
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install native deps
        # `serialport` pulls libudev-sys; `qdl-rs` + transitive
        # libusb1-sys need libusb-1.0-0-dev; iced needs the X11 +
        # Wayland + xkbcommon + fontconfig stack at link time. The
        # exact list mirrors what L1's Linux notes call out so README
        # / package docs can stay in sync with what CI proves green.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libusb-1.0-0-dev \
            libudev-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libfontconfig1-dev

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - name: Cargo source cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-sources-${{ runner.os }}-${{ runner.arch }}
          cache-targets: false
          cache-bin: false

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Resolve release tag or commit
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${GITHUB_SHA:0:7}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: cargo build --release
        run: cargo build --release --locked --target ${{ matrix.target }} -p ltbox-gui

      - name: Stage artifact
        id: stage
        # tar.gz with `gzip -9` for the Linux artifact: tar
        # preserves the executable bit on `ltbox` (zip on Linux
        # erases it, leaving users to `chmod +x` after extract),
        # and `gzip -9` shaves an extra few percent off the wire
        # size vs the default zip flate-compressed level. xz would
        # win another 20-30 % on top of gzip but adds an apt
        # install on user machines that don't ship `xz-utils` by
        # default — gzip is universally available.
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          stage_basename="LTBox-linux_${{ matrix.arch }}-${tag}"
          stage_dir="stage/${stage_basename}"
          mkdir -p "${stage_dir}"
          cp "target/${{ matrix.target }}/release/ltbox" "${stage_dir}/"
          [[ -f README.md ]] && cp README.md "${stage_dir}/"
          [[ -f LICENSE ]]   && cp LICENSE   "${stage_dir}/"
          tar_name="${stage_basename}.tar.gz"
          (
            cd "$(dirname "${stage_dir}")"
            tar -cf - "${stage_basename}" | gzip -9 > "${OLDPWD}/${tar_name}"
          )
          sha256sum "${tar_name}" | awk '{print $1"  "$2}' > "${tar_name}.sha256"
          echo "tarball=${tar_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux_${{ matrix.arch }}-${{ steps.meta.outputs.tag }}
          path: |
            ${{ steps.stage.outputs.tarball }}
            ${{ steps.stage.outputs.tarball }}.sha256
          if-no-files-found: error

  build-macos:
    name: Build macos_universal
    # macos-26 is the Apple Silicon (arm64) runner; the x86_64 slice
    # cross-builds on it natively (Apple clang + the universal SDK), so one
    # runner produces the lipo'd universal binary. macOS needs no apt-style
    # native deps — libusb is vendored static (LIBUSB_STATIC=1), Metal and
    # the rest are system frameworks. Free runner minutes for public repos.
    # macos-26 (Xcode 26) is used so make-app.sh can render the Liquid Glass
    # AppIcon via Icon Composer's `ictool` (bundled in Xcode 26); if it is ever
    # unavailable, make-app.sh falls back to the committed misc/macos/AppIcon.icns.
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        # rustup is preinstalled on the macOS runner; `rustup show` triggers the
        # toml-driven 1.95.0 install, then add both Mac targets so
        # make-app.sh can lipo a universal binary.
        run: |
          rustup show
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cargo source cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-sources-${{ runner.os }}-${{ runner.arch }}
          cache-targets: false
          cache-bin: false

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Resolve release tag or commit
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${GITHUB_SHA:0:7}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Build universal LTBox.app + tarball
        # make-app.sh builds both Mac arches (LIBUSB_STATIC=1), lipo's the
        # universal binary, assembles + ad-hoc-signs LTBox.app, and packages
        # it as a .tar.gz. No Developer ID here — notarization is the optional
        # S4 path (set MACOS_SIGN_IDENTITY + add signing secrets to enable it).
        run: ./misc/macos/make-app.sh

      - name: Stage artifact
        id: stage
        # make-app.sh already produced a tarball of the ad-hoc-signed .app
        # (signature lives inside the bundle, so it survives tar). Just rename
        # it to the tagged convention and checksum it.
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          tar_name="LTBox-macos_universal-${tag}.tar.gz"
          mv "dist/macos/LTBox-macos-universal.tar.gz" "${tar_name}"
          shasum -a 256 "${tar_name}" | awk '{print $1"  "$2}' > "${tar_name}.sha256"
          echo "tarball=${tar_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos_universal-${{ steps.meta.outputs.tag }}
          path: |
            ${{ steps.stage.outputs.tarball }}
            ${{ steps.stage.outputs.tarball }}.sha256
          if-no-files-found: error

  test-macos:
    # macOS test gate — distinct from the universal packaging job so validation
    # can run in parallel with the slower two-slice release build. Both Mac
    # slices of the universal binary are tested natively: arm64 on macos-26 and
    # x86_64 on macos-26-intel. (macos-26 = the Apple Silicon image; the bare
    # `macos-26` label is arm64. macos-26-intel = the standard x64 image —
    # macos-26-large is the separate "larger" x64 runner.) Standard runners are
    # free for public repos.
    name: Test macos_${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: arm64,  runner: macos-26,       target: aarch64-apple-darwin }
          - { arch: x86_64, runner: macos-26-intel, target: x86_64-apple-darwin }
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        # rustup is preinstalled on the macOS runner; `rustup show` triggers the
        # toml-driven 1.95.0 install. `rustup target add` is a no-op for the
        # host arch but keeps the step identical across both legs.
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - name: Cargo source cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-sources-macos-${{ matrix.arch }}
          cache-targets: false
          cache-bin: false

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: cargo clippy (native macOS)
        # Lints the cfg(target_os = "macos") paths that the Windows-targeted
        # clippy job never sees. The cfg is identical for both Apple targets,
        # so linting once on the arm64 leg is enough.
        if: ${{ matrix.arch == 'arm64' }}
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace --locked --target ${{ matrix.target }}

  test:
    # Cross-built .exes can't execute on the Linux build runners
    # (Wine + iced GUI is not a serious testing strategy), so the
    # unit + integration test gate runs on a real Windows host
    # against the host architecture only. arm64 lands in the build
    # matrix above for compile-time validation; runtime coverage is
    # the x86_64 host's job.
    name: Test (host x86_64)
    runs-on: windows-2025-vs2026
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        # rustup is preinstalled on the Windows 2025 + VS 2026 image;
        # `rustup show` triggers the toml-driven 1.95.0 install.
        run: rustup show

      - name: Cargo source cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-sources-${{ runner.os }}-${{ runner.arch }}
          cache-targets: false
          cache-bin: false

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: cargo test --workspace
        run: cargo test --workspace --locked

  test-linux:
    # Linux native test gate — distinct from the Windows test job
    # because conditional deps activate per `cfg(target_os = ...)`.
    # Same package list as `build-linux` so what CI proves green
    # locally maps 1:1 to what packagers will need to install.
    name: Test linux_x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libusb-1.0-0-dev \
            libudev-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libfontconfig1-dev

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        run: rustup show

      - name: Cargo source cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-sources-${{ runner.os }}-${{ runner.arch }}
          cache-targets: false
          cache-bin: false

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: cargo clippy (native Linux)
        # Lints the cfg(target_os = "linux") paths that the Windows-targeted
        # clippy job never sees.
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace --locked

  release:
    name: Draft GitHub Release
    needs: [fmt-clippy, cargo-deny, build-windows, build-linux, build-macos, test, test-linux, test-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/**/LTBox-win_x86_64-*.zip
            artifacts/**/LTBox-win_x86_64-*.zip.sha256
            artifacts/**/LTBox-win_arm64-*.zip
            artifacts/**/LTBox-win_arm64-*.zip.sha256
            artifacts/**/LTBox-linux_x86_64-*.tar.gz
            artifacts/**/LTBox-linux_x86_64-*.tar.gz.sha256
            artifacts/**/LTBox-linux_arm64-*.tar.gz
            artifacts/**/LTBox-linux_arm64-*.tar.gz.sha256
            artifacts/**/LTBox-macos_universal-*.tar.gz
            artifacts/**/LTBox-macos_universal-*.tar.gz.sha256
