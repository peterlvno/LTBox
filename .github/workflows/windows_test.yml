name: Windows Smoke Test & Unit Test

concurrency:
  group: ${{ github.workflow }}-windows-test-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_call:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ github.event_name == 'workflow_call' && 'true' || steps.filter.outputs.python_ci }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ github.event_name != 'workflow_call' }}
      - id: filter
        if: ${{ github.event_name != 'workflow_call' }}
        uses: dorny/paths-filter@v4
        with:
          filters: .github/path-filters.yml

  unit-test:
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    needs: changes
    uses: ./.github/workflows/python-command.yml
    with:
      task: unit

  architecture-test:
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    needs: changes
    uses: ./.github/workflows/python-command.yml
    with:
      task: architecture

  integration-test:
    if: ${{ needs.changes.outputs.should_run == 'true' }}
    needs:
      - changes
      - unit-test
    runs-on: windows-latest
    env:
      TEST_FW_URL: ${{ secrets.TEST_FW_URL }}
      TEST_FW_PASSWORD: ${{ secrets.TEST_FW_PASSWORD }}
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "bin"

    steps:
      - uses: actions/checkout@v6

      - name: Free Disk Space (Windows)
        run: |
          Write-Host "Cleaning up disk space..."
          if (Test-Path "C:\Android") { Remove-Item -Recurse -Force "C:\Android" -ErrorAction SilentlyContinue }
          Get-PSDrive C | Select-Object Used,Free

      - name: Setup Environment & FW Cache
        uses: ./.github/actions/setup-fw-env
        with:
          fw-password: ${{ secrets.TEST_FW_PASSWORD }}
          fw-url: ${{ secrets.TEST_FW_URL }}

      - name: Cache and Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          install: gcc cmake make zlib-devel git
          cache: true

      - name: Cache Compiled Tools
        uses: actions/cache@v5
        with:
          path: bin/tools
          key: tools-bin-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('tests/scripts/build_tools.py', 'tests/scripts/cache_fw.py', 'bin/ltbox/config.json', '.github/actions/setup-fw-env/action.yml', '.github/workflows/windows_test.yml') }}
          restore-keys: |
            tools-bin-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Run Integration Tests
        run: |
          pytest -s tests/ -m integration --run-integration --cov=bin/ltbox --cov-report=term-missing

      - name: Upload tools artifact
        uses: actions/upload-artifact@v7
        with:
          name: tools-exe
          path: |
            bin/tools/magiskboot.exe
            bin/tools/openssl.exe
            bin/tools/*.dll
