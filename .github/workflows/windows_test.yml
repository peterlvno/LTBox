name: Windows Smoke Test & Unit Test

concurrency:
  group: ${{ github.workflow }}-windows-test-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

on:
  workflow_call:

jobs:
  unit-test:
    uses: ./.github/workflows/python-command.yml
    with:
      task: unit

  architecture-test:
    uses: ./.github/workflows/python-command.yml
    with:
      task: architecture

  build-tools:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Python & Dependencies
        uses: ./.github/actions/setup-python-deps
        with:
          python-version: '3.14'

      - name: Cache and Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          install: gcc cmake make zlib-devel git
          cache: true

      - name: Cache Compiled Tools
        uses: actions/cache@v5
        with:
          path: bin/tools
          key: tools-bin-v4-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('vendor/MagiskbootAlone/**', 'tests/scripts/build_tools.py', 'tests/scripts/cache_fw.py', 'bin/ltbox/config.json', '.github/ci-tools.json', '.github/actions/setup-fw-env/action.yml', '.github/workflows/windows_test.yml') }}
          restore-keys: |
            tools-bin-v4-${{ runner.os }}-${{ runner.arch }}-

      - name: Build magiskboot
        run: python tests/scripts/build_tools.py

      - name: Bundle CI tools
        run: python .github/scripts/release/bundle-tools.py

      - name: Upload tools artifact
        uses: actions/upload-artifact@v7
        with:
          name: tools-exe
          path: |
            bin/tools/magiskboot.exe
            bin/tools/magiskboot_xz_helper.exe
            bin/tools/openssl.exe
            bin/tools/*.dll

  integration-test:
    needs: [unit-test, build-tools]
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      TEST_FW_URL: ${{ secrets.TEST_FW_URL }}
      TEST_FW_PASSWORD: ${{ secrets.TEST_FW_PASSWORD }}
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "bin"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Free Disk Space (Windows)
        run: |
          Write-Host "Cleaning up disk space..."
          if (Test-Path "C:\Android") { Remove-Item -Recurse -Force "C:\Android" -ErrorAction SilentlyContinue }
          Get-PSDrive C | Select-Object Used,Free

      - name: Setup Environment & FW Cache
        uses: ./.github/actions/setup-fw-env
        with:
          fw-password: ${{ secrets.TEST_FW_PASSWORD }}
          fw-url: ${{ secrets.TEST_FW_URL }}

      - name: Download tools artifact
        uses: actions/download-artifact@v8
        with:
          name: tools-exe
          path: bin/tools

      - name: Run Integration Tests
        run: |
          pytest -s tests/ -m integration --run-integration --cov=bin/ltbox --cov-report=term-missing
