name: Windows Smoke Test & Unit Test

on:
  push:
    branches:
      - '**'
    paths:
      - 'bin/**'
      - 'tests/**'
      - '.github/workflows/windows_test.yml'
      - '.github/workflows/python-command.yml'
  pull_request:
    paths:
      - 'bin/**'
      - 'tests/**'
      - '.github/workflows/windows_test.yml'
      - '.github/workflows/python-command.yml'
  workflow_call:

jobs:
  unit-test:
    uses: ./.github/workflows/python-command.yml
    with:
      runner: windows-latest
      python-version: '3.14'
      extra-env: |
        PYTHONUNBUFFERED=1
        PYTHONPATH=bin
      run-command: |
        python -m compileall bin/ltbox
        pytest -s tests/ -m "not integration and not architecture" --cov=bin/ltbox --cov-report=term-missing

  architecture-test:
    uses: ./.github/workflows/python-command.yml
    with:
      runner: ubuntu-latest
      python-version: '3.14'
      extra-env: |
        PYTHONUNBUFFERED=1
        PYTHONPATH=bin
      run-command: |
        pytest -s tests/core/test_exports.py -m architecture

  integration-test:
    needs: unit-test
    runs-on: windows-latest
    env:
      TEST_FW_URL: ${{ secrets.TEST_FW_URL }}
      TEST_FW_PASSWORD: ${{ secrets.TEST_FW_PASSWORD }}
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "bin"

    steps:
      - uses: actions/checkout@v6

      - name: Free Disk Space (Windows)
        run: |
          Write-Host "Cleaning up disk space..."
          if (Test-Path "C:\Android") { Remove-Item -Recurse -Force "C:\Android" -ErrorAction SilentlyContinue }
          Get-PSDrive C | Select-Object Used,Free

      - name: Setup Environment & FW Cache
        uses: ./.github/actions/setup-fw-env
        with:
          fw-password: ${{ secrets.TEST_FW_PASSWORD }}
          fw-url: ${{ secrets.TEST_FW_URL }}

      - name: Cache and Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          install: gcc cmake make zlib-devel git
          cache: true

      - name: Cache Compiled Tools
        uses: actions/cache@v5
        with:
          path: bin/tools
          key: tools-bin-windows-${{ github.run_id }}
          restore-keys: |
            tools-bin-windows-

      - name: Run Integration Tests
        run: |
          pytest -s tests/ -m integration --run-integration --cov=bin/ltbox --cov-report=term-missing

      - name: Upload tools artifact
        uses: actions/upload-artifact@v7
        with:
          name: tools-exe
          path: |
            bin/tools/magiskboot.exe
            bin/tools/openssl.exe
            bin/tools/*.dll
