name: Windows Smoke Test & Unit Test

concurrency:
  group: ${{ github.workflow }}-windows-test-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

on:
  workflow_call:

jobs:
  unit-test:
    uses: ./.github/workflows/python-command.yml
    with:
      task: unit

  architecture-test:
    uses: ./.github/workflows/python-command.yml
    with:
      task: architecture

  build-avbtool-rs:
    uses: ./.github/workflows/build-avbtool-rs.yml

  build-magiskboot-rs:
    uses: ./.github/workflows/build-magiskboot-rs.yml

  integration-test:
    needs: [unit-test, build-magiskboot-rs, build-avbtool-rs]
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      TEST_FW_URL: ${{ secrets.TEST_FW_URL }}
      TEST_FW_PASSWORD: ${{ secrets.TEST_FW_PASSWORD }}
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "bin"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Free Disk Space (Windows)
        run: |
          Write-Host "Cleaning up disk space..."
          if (Test-Path "C:\Android") { Remove-Item -Recurse -Force "C:\Android" -ErrorAction SilentlyContinue }
          Get-PSDrive C | Select-Object Used,Free

      - name: Setup Environment & FW Cache
        uses: ./.github/actions/setup-fw-env
        with:
          fw-password: ${{ secrets.TEST_FW_PASSWORD }}
          fw-url: ${{ secrets.TEST_FW_URL }}

      - name: Download magiskboot-rs artifact
        uses: actions/download-artifact@v8
        with:
          name: magiskboot-rs-windows
          path: bin/tools

      - name: Download avbtool-rs artifact
        uses: actions/download-artifact@v8
        with:
          name: avbtool-rs-windows
          path: bin/tools

      - name: Run Integration Tests
        run: |
          pytest -s tests/ -m integration --run-integration --cov=bin/ltbox --cov-report=term-missing
