version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/bin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "github-actions"
    directory: "/.github/actions/setup-python-deps"
    schedule:
      interval: "monthly"

  - package-ecosystem: "github-actions"
    directory: "/.github/actions/setup-fw-env"
    schedule:
      interval: "monthly"

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "weekly"
