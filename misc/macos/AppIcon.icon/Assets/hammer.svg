<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    LTBox macOS Liquid Glass icon — FOREGROUND layer (hammer mark).

    A FILLED rendering derived from the Lucide `hammer` glyph used on
    Windows/Linux (crates/ltbox-gui/assets/icon_source.svg): the same hammer
    geometry, mirrored + centred, but the paths are closed and filled (one
    small sub-path dropped) instead of stroked, so the inside is solid.
    ictool / Icon Composer honours filled paths (not
    strokes), and the Liquid Glass material reads on a solid shape. Body colour
    + glass sheen come from the layer `fill` in icon.json; the white here only
    makes the file preview on its own. Geometry mirrors icon_source.svg,
    centred and enlarged for the icon canvas:
    translate(512 512) scale(-34.2 34.2) translate(-12 -12) — i.e. the prior
    22.8 base ×1.5 so the mark reads at a comfortable size.
  -->
  <g transform="translate(512 512) scale(-34.2 34.2) translate(-12 -12)"
     fill="#FFFFFF" fill-rule="nonzero">
    <path d="m15 12-9.373 9.373a1 1 0 0 1-3.001-3L12 9Z"/>
    <path d="m21.5 11.5-1.914-1.914A2 2 0 0 1 19 8.172v-.344a2 2 0 0 0-.586-1.414l-1.657-1.657A6 6 0 0 0 12.516 3H9l1.243 1.243A6 6 0 0 1 12 8.485V10l2 2h1.172a2 2 0 0 1 1.414.586L18.5 14.5Z"/>
  </g>
</svg>
