# iced_lucide subset definition — generates `src/icon.rs` at build
# time with one Text-returning function per entry.
#
# Format: `<rust_fn_name> = "<lucide-kebab-case-name>"`.
# Browse available icons at https://lucide.dev/icons.
module = "icon"

[icons]
# Sidebar nav (18 px)
nav_dashboard     = "layout-dashboard"
nav_flash         = "zap"
nav_system_update = "cloud-download"
nav_root          = "lock-open"
nav_unroot        = "lock"
nav_reboot        = "rotate-cw"
nav_advanced      = "sliders-horizontal"
nav_settings      = "settings"

# Reboot target cards (64 px)
reboot_system     = "smartphone"
reboot_recovery   = "wrench"
reboot_bootloader = "terminal"
reboot_edl        = "usb"

# Root mode (72 px)
root_lkm          = "puzzle"
root_gki          = "layers"

# Version choice (72 px)
ver_stable        = "badge-check"
ver_nightly       = "moon"

# SKRoot edition choice (72 px)
skroot_lite       = "shield-check"

# Nightly source (72 px)
nightly_auto      = "wand-sparkles"
nightly_manual    = "pencil-line"

# Operation status (72 px)
op_running        = "loader-circle"
op_done           = "circle-check-big"
op_failed         = "circle-x"

# Window chrome (10 px)
win_minimize      = "minus"
win_maximize      = "square"
win_restore       = "copy"
win_close         = "x"

# Wizard floating actions
fab_back          = "arrow-left"
fab_next          = "arrow-right"
fab_start         = "play"
fab_cancel        = "x"
fab_show_log      = "file-text"
fab_save_log      = "save"
fab_open_folder   = "folder-open"
fab_start_over    = "rotate-ccw"

# Region picker
region_prc        = "star"
region_row        = "globe"

# Flash / sysupdate wizard cards
tile_globe        = "globe-x"
tile_device       = "earth-lock"
tile_shield       = "file-text"
tile_wipe         = "shredder"
tile_update_off   = "bell-off"
tile_update_on    = "bell"
tile_rescue       = "life-buoy"

# Recents label (12 px)
history           = "history"

# Settings default-loader inline icon buttons (18 px)
settings_browse   = "square-pen"
settings_clear    = "eraser"

# Settings maintenance — clean leftover temp/scratch files (18 px)
settings_cleanup  = "trash-2"

# About panel
nav_about         = "info"
about_github      = "github"
about_wiki        = "book-open"
about_issue       = "bug"
